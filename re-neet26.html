<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RE-NEET 26 Detailed Answer Key PDF</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
      color:#003366;
      background:linear-gradient(135deg,#fff7ec,#ffb066);
      text-align:center;
    }

    .download-card{
      width:min(560px,100%);
      padding:30px 22px;
      border:2px solid #ff9933;
      border-radius:12px;
      background:#ffffff;
      box-shadow:0 16px 40px rgba(0,0,0,0.18);
    }

    h1{
      margin:0 0 10px;
      font-size:clamp(1.55rem,5vw,2.35rem);
      line-height:1.12;
    }

    p{
      margin:0 0 22px;
      color:#333;
      font-weight:600;
      line-height:1.45;
    }

    .download-btn{
      display:inline-block;
      padding:13px 22px;
      border-radius:8px;
      color:#003366;
      background:#ffcc00;
      font-weight:900;
      text-decoration:none;
    }

    .download-btn:hover,
    .download-btn:focus-visible{
      background:#ff9933;
    }
  </style>
</head>
<body>
  <main class="download-card">
    <h1>RE-NEET 26 - Detailed Answer Key</h1>
    <p>Your PDF is ready. If the download does not start automatically, click the button below.</p>
    <a id="downloadLink" class="download-btn" href="re-neet26.pdf" download>Download PDF</a>
  </main>
  <script>
    window.addEventListener("DOMContentLoaded", function(){
      const link = document.getElementById("downloadLink");
      if(link) link.click();
    });
  </script>
</body>
</html>
