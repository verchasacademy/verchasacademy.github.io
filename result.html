<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Check your Verchas Academy Test results. Enter your registered mobile number to view your marks and performance analysis.">
  <title>Test Results | Verchas Academy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://verchasacademy.in/result.html">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 420px;
      margin: 60px auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      text-align: center;
    }

    h1 {
      color: #004aad;
      margin-bottom: 25px;
    }

    input {
      align-items: center;
      
      padding: 14px;
      font-size: 1em;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #004aad;
      color: #fff;
      font-size: 1.05em;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #003080;
    }

    .home-btn {
      display: inline-block;
      margin-top: 18px;
      padding: 12px 24px;
      background: #ffcc00;
      color: #004aad;
      font-weight: 800;
      text-decoration: none;
      border-radius: 8px;
      box-shadow: 0 5px 14px rgba(0,0,0,0.18);
    }

    .home-btn:hover {
      background: #004aad;
      color: #fff;
    }

    .result {
      margin-top: 20px;
      font-size: 1.05em;
      font-weight: 600;
    }

    .error {
      color: #e53935;
    }

    .success {
      color: #2e7d32;
    }
.logo {
  max-width: 120px;
  margin-bottom: 4px;
}
.academy-name{
  font-size: 2.1em;      /* BIGGER */
  color: #004aad;
  margin: 2px 0 4px 0;
  font-weight: 800;
  letter-spacing: 1px;
}

.page-title{
  font-size: 1.8em;      /* smaller than academy name */
  color: #333;
  margin-bottom: 22px;
  font-weight: 700;
}
/* 🔄 Loading Spinner */
.loader {
  width: 42px;
  height: 42px;
  border: 4px solid #e0e0e0;
  border-top: 4px solid #004aad;
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
  margin: 18px auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
.note-box {
  margin-top: 10px;
  padding: 12px;
  background: #fff3cd;
  border-left: 5px solid #ff9800;
  border-radius: 6px;
  font-size: 0.9em;
  line-height: 1.6;
  text-align: justify;   /* 👈 ye add karo */
}
  </style>
</head>

<body>

  <div class="container">
    <img src="verchas-logo.webp" alt="Verchas Academy Logo" class="logo">
    <h1 class="academy-name">Verchas Academy</h1>
    <h2 class="page-title" id="pageTitle">Test Result</h2>

    <input
      type="text"
      id="mobile"
      placeholder="Registered Mobile Number"
      maxlength="10"
    >

    <button onclick="getResult()">View Result</button>

    <div id="result" class="result"></div>
    <a href="index.html" id="homeBtn" class="home-btn">Home</a>
  </div>

  <script>
const API_URL = "https://script.google.com/macros/s/AKfycbxwCM3PcFUxXSX2rcM5vCKyutcqf6FLBH-OYKQ7i67Uxo_Uh7nOIUpQJwZOu9fySPHSbg/exec";
const TESTS = {
  misc: "Miscellaneous Result",
  minor1: "1st Minor Test Result",
  minor2: "2nd Minor Test Result"
};
const params = new URLSearchParams(window.location.search);
const selectedTest = TESTS[params.get("test")] ? params.get("test") : "misc";
document.getElementById("pageTitle").textContent = TESTS[selectedTest];
const returnPage = params.get("lang") === "hi" ? "hindi.html" : "index.html";
document.getElementById("homeBtn").href = returnPage;

function getResult() {
  const mobile = document.getElementById("mobile").value.trim();
  const resultDiv = document.getElementById("result");

  resultDiv.innerHTML = "";

  if (mobile.length !== 10) {
    resultDiv.innerHTML = "<span class='error'>Please enter a valid 10-digit mobile number</span>";
    return;
  }

  // 🔄 Show loading spinner
  resultDiv.innerHTML = "<div class='loader'></div><div>Fetching result…</div>";

  fetch(API_URL + "?test=" + encodeURIComponent(selectedTest) + "&mobile=" + encodeURIComponent(mobile))
    .then(res => res.json())
    .then(data => {
      if (data.error) {
        resultDiv.innerHTML = "<span class='error'>No result found</span>";
      } else {
        resultDiv.innerHTML =
  "<div class='success'>" +
  "Name: <b>" + data.name + "</b><br>" +
  "Marks Obtained: <b>" + data.marks + "</b>" +
  "</div>" +

  "</div>";
      }
    })
    .catch(() => {
      resultDiv.innerHTML = "<span class='error'>Something went wrong. Please try again.</span>";
    });
}
</script>
</body>
</html>
